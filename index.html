<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101a1d">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon-32x32.png" sizes="32x32" type="image/png">
<link rel="icon" href="favicon-16x16.png" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>Stretch -- a minimal stretching companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header class="topbar">
    <span class="brand">Stretch</span>
    <nav class="tabs" id="tabs">
      <button data-view="home" class="tab active">Routines</button>
      <button data-view="log" class="tab">Log</button>
      <button data-view="metrics" class="tab">Metrics</button>
    </nav>
  </header>

  <main id="views">
    <section id="view-home" class="view active"></section>
    <section id="view-preview" class="view"></section>
    <section id="view-session" class="view"></section>
    <section id="view-log" class="view"></section>
    <section id="view-metrics" class="view"></section>
  </main>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
